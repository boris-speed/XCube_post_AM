include_configs:
  - ../train/diffusion/diffusion_128x128x128_sparse.yaml
  - gpr.yaml

name: 'gpr/Diffusion_stage2_v5'

# --- Stage 2 v5 (this config): tests the "loss reweighting" theory. v1-v4 all
# weighted every training sample equally, so the ~64% "good" tier (where blind
# copy-through of TEUNet's hint is already near-optimal) dominates the average
# loss and gives the model little incentive to learn real correction behavior
# on the ~13% "poor" tier where correction actually matters. This config keeps
# v1's architecture and plain GT footprint exactly as-is (capacity and
# structural-confinement fixes were both already ruled out) and changes only
# one thing: up-weight each training sample's loss contribution by how much
# TEUNet's grid diverges from GT (xcube/data/gpr.py's hardness_scale, wired
# through diffusion.py's use_hardness_reweight).
train_kwargs:
  input_key: "target_grid"
  hardness_scale: 3.0
val_kwargs:
  input_key: "target_grid"
  hardness_scale: 3.0
test_kwargs:
  input_key: "target_grid"
  hardness_scale: 3.0

use_hardness_reweight: true

resolution: "0.005"

vae_config: "/home/ameliacatala/Documents/XCube/configs/gpr/gpr_vae.yaml"
vae_checkpoint: "/home/ameliacatala/Documents/checkpoints/gpr/VAE_stage1/version_4/checkpoints/last.ckpt"

conditioning_key: "concat"
use_cond_grid_concat_cond: true
num_classes: 16

log_image: false

ema: false
scale_by_std: true
use_ddim: true
num_inference_steps: 100

num_train_timesteps: 1000
beta_start: 0.0001
beta_end: 0.02
beta_schedule: "linear"
prediction_type: "epsilon"

supervision:
  mse_weight: 1.0

optimizer: "Adam"
learning_rate:
  init: 5.0e-5
  decay_mult: 1.0
  decay_step: 2000000000
  clip: 1.0e-6
weight_decay: 0.0
grad_clip: 0.5

# --- Same architecture as v1: capacity was already ruled out (v4-capacity
# landed below v1-v3's ceiling), so this isolates reweighting as the only
# new variable. ---
network:
  diffuser_name: "UNetModel_Sparse"
  diffuser:
    dims: 3
    image_size: [32, 32, 24]
    model_channels: 32
    use_middle_attention: false
    channel_mult: [1, 2]
    attention_resolutions: []
    num_res_blocks: 1
    num_heads: 4
  scheduler:
    num_train_timesteps: ${num_train_timesteps}
    beta_start: ${beta_start}
    beta_end: ${beta_end}
    beta_schedule: ${beta_schedule}
    variance_type: "fixed_small"
    clip_sample: False
    prediction_type: ${prediction_type}

batch_size: 2
train_val_num_workers: 4
