include_configs:
  - ../train/diffusion/diffusion_128x128x128_sparse.yaml
  - gpr.yaml

name: 'gpr/Diffusion_stage2'

# --- Stage 2 (this config): conditional diffusion, conditioned on TEUNet's flawed grid. ---
# DS.INPUT_PC (via input_key="target_grid") is the GT shape: diffusion.py's extract_latent
# always treats DS.INPUT_PC as "the main shape to noise/denoise". TEUNet's flawed grid
# comes in separately as DS.COND_PC (added in xcube/data/gpr.py) and gets encoded through
# the frozen Stage 1 VAE's own encoder, then concatenated onto the noisy latent.
train_kwargs:
  input_key: "target_grid"
val_kwargs:
  input_key: "target_grid"
test_kwargs:
  input_key: "target_grid"

resolution: "0.005"

# --- Frozen Stage 1 VAE: provides the latent space we denoise into. ---
vae_config: "/home/ameliacatala/Documents/XCube/configs/gpr/gpr_vae.yaml"
vae_checkpoint: "/home/ameliacatala/Documents/checkpoints/gpr/VAE_stage1/version_4/checkpoints/last.ckpt"

# --- Condition on TEUNet's grid via concat (see xcube/models/diffusion.py's
# use_cond_grid_concat_cond branch in _forward_cond) ---
conditioning_key: "concat"
use_cond_grid_concat_cond: true
# num_classes = condition latent's channel count = VAE's own latent channel count,
# since the condition is encoded through that same VAE encoder:
#   f_maps(32) * 2^(num_blocks(2)-1) / cut_ratio(4) = 16
num_classes: 16

log_image: false  # skip the periodic sampling/visualization for now -- not wired up yet

ema: false
scale_by_std: true
use_ddim: true
num_inference_steps: 100

num_train_timesteps: 1000
beta_start: 0.0001
beta_end: 0.02
beta_schedule: "linear"
prediction_type: "epsilon"

supervision:
  mse_weight: 1.0

optimizer: "Adam"
learning_rate:
  init: 5.0e-5
  decay_mult: 1.0
  decay_step: 2000000000  # effectively constant learning rate
  clip: 1.0e-6
weight_decay: 0.0
grad_clip: 0.5

# --- small network: GPR's latent grid is tiny (32x32x24, 16 channels) vs Waymo's scale ---
network:
  diffuser_name: "UNetModel_Sparse"
  diffuser:
    dims: 3
    image_size: [32, 32, 24]
    model_channels: 32
    use_middle_attention: false
    channel_mult: [1, 2]
    attention_resolutions: []
    num_res_blocks: 1
    num_heads: 4
  scheduler:
    num_train_timesteps: ${num_train_timesteps}
    beta_start: ${beta_start}
    beta_end: ${beta_end}
    beta_schedule: ${beta_schedule}
    variance_type: "fixed_small"
    clip_sample: False
    prediction_type: ${prediction_type}

batch_size: 2
train_val_num_workers: 4
